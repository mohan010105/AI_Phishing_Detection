kind = "web"
previewPath = "/"
title = "AI Phishing Detection Platform"
version = "1.0.0"
id = "artifacts/phishing-detector"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22772

[services.development]
run = "pnpm --filter @workspace/phishing-detector run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/phishing-detector", "run", "build" ]
publicDir = "artifacts/phishing-detector/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22772"
BASE_PATH = "/"
